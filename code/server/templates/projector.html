<!DOCTYPE html>
<html>
<head>
  <title>projector</title>
  <style>
    /* Rear-projection: keep the image PRIMARILY BRIGHT so the projector emits enough light. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #f5f5f0; color: #111; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
    #stage { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f5f0; }
    #waiting { color: #555; font-size: 1.5em; }
    #map-wrap { position: relative; background: #ffffff; }
    canvas, .layer { position: absolute; top: 0; left: 0; }
    .token {
      position: absolute;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      color: #fff;
      font-weight: 800;
      box-shadow: 0 0 0 3px #1a1a1a, 0 2px 6px rgba(0,0,0,0.4);
      font-size: 1em;
      letter-spacing: 0.02em;
      transition: left 0.25s ease, top 0.25s ease;
    }
    .token.pc { background: #1879c4; }       /* strong blue */
    .token.enemy { background: #c92020; }    /* strong red */
    .token.current { box-shadow: 0 0 0 4px #d4a017, 0 0 18px rgba(212, 160, 23, 0.7); }
    .token.dead { opacity: 0.45; filter: grayscale(1); }
    #status-bar {
      position: fixed; top: 16px; left: 16px;
      background: rgba(255,255,255,0.92); padding: 10px 16px; border-radius: 8px;
      border: 2px solid #1a1a1a;
      font-size: 1.1em; color: #111;
      font-weight: 600;
    }
    #status-bar .round { color: #b8770f; }
    #status-bar .turn { color: #1a6b5d; }
  </style>
</head>
<body>
<div id="stage">
  <div id="waiting">no map active. DM, set a battle map.</div>
  <div id="map-wrap" style="display:none">
  </div>
</div>
<div id="status-bar" style="display:none">
  <span class="round">round —</span> · current: <span class="turn">—</span>
</div>

<script>
const SESSION_ID = {{ session_id }};
const PERSPECTIVE = 'party';  // projector = party perspective (vision-filtered)
let SQUARE_PX = 50;
let cols = 0, rows = 0;
let GRID_TYPE = 'square';
let FEET_PER_SQUARE = 5;

const HEX_W = Math.sqrt(3) / 2;
const HEX_V_SPACING = 0.75;
function isHex() { return GRID_TYPE === 'hex'; }
function cellCenter(col, row) {
  if (isHex()) return [col * HEX_W + HEX_W/2 + (row % 2) * HEX_W/2, row * HEX_V_SPACING + 0.5];
  return [col + 0.5, row + 0.5];
}
function hexPath(ctx, cxPx, cyPx, sizePx) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI/2 + i * Math.PI/3;
    const px = cxPx + sizePx * Math.cos(a);
    const py = cyPx + sizePx * Math.sin(a);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

// High-contrast colors for projection. Avoid pure black; favor saturated bright tints.
const ZONE_COLORS = {
  bright: 'rgba(255, 230, 120, 0.30)',   // warm yellow
  dim: 'rgba(140, 150, 180, 0.35)',      // cool blue-grey (lighter)
  dark: 'rgba(80, 80, 100, 0.45)',       // dim grey-blue (still readable)
  magical_dark: 'rgba(140, 60, 200, 0.55)',  // saturated purple
  difficult: 'rgba(200, 140, 80, 0.40)', // warm tan
  water: 'rgba(80, 170, 230, 0.50)',     // saturated blue
};

async function fetchState() {
  try {
    const res = await fetch(`/sessions/${SESSION_ID}/state?perspective=${PERSPECTIVE}`);
    if (!res.ok) return null;
    return await res.json();
  } catch (e) { return null; }
}

// Physical projection geometry (server-supplied so it matches projection.py).
const PLAY_W_IN = {{ play_w }};
const PLAY_H_IN = {{ play_h }};
const LIP_IN = {{ lip }};
const PLAYER_DEFAULT_MARGIN_IN = {{ player_default_margin }};
const PLAYER_GEOMETRY_MARGIN_IN = {{ player_geometry_margin }};
const DM_EDGE = "{{ dm_edge }}";

function effectiveInsetPx() {
  const pxPerInchX = window.innerWidth / PLAY_W_IN;
  const pxPerInchY = window.innerHeight / PLAY_H_IN;
  let leftIn = LIP_IN, rightIn = LIP_IN, topIn = LIP_IN, bottomIn = LIP_IN;
  const extra = PLAYER_DEFAULT_MARGIN_IN + PLAYER_GEOMETRY_MARGIN_IN;
  if (DM_EDGE === 'left') rightIn += extra;
  else if (DM_EDGE === 'right') leftIn += extra;
  else if (DM_EDGE === 'top') bottomIn += extra;
  else if (DM_EDGE === 'bottom') topIn += extra;
  return {
    leftPx: leftIn * pxPerInchX, rightPx: rightIn * pxPerInchX,
    topPx: topIn * pxPerInchY, bottomPx: bottomIn * pxPerInchY,
    pxPerInch: Math.min(pxPerInchX, pxPerInchY),
  };
}

function gridFootprintCells(state) {
  const c = state.map.grid_cols, r = state.map.grid_rows;
  if ((state.map.grid_type || 'square') === 'hex') {
    return { wCells: (c + 0.5) * (Math.sqrt(3) / 2), hCells: 0.75 * r + 0.25 };
  }
  return { wCells: c, hCells: r };
}

function fitToWindow(state) {
  cols = state.map.grid_cols;
  rows = state.map.grid_rows;
  GRID_TYPE = state.map.grid_type || 'square';
  FEET_PER_SQUARE = state.map.feet_per_square || 5;
  const ipc = state.map.inches_per_square || 1.0;
  const inset = effectiveInsetPx();
  const availW = window.innerWidth - inset.leftPx - inset.rightPx;
  const availH = window.innerHeight - inset.topPx - inset.bottomPx;

  // Physical-scale cell size: each cell renders at exactly inches_per_square
  // physical inches. If the map's footprint exceeds the inset rect, fall back
  // to fit-to-rect scaling (legacy/oversized maps).
  const fp = gridFootprintCells(state);
  let cellPx = ipc * inset.pxPerInch;
  const physW = fp.wCells * cellPx;
  const physH = fp.hCells * cellPx;
  if (physW > availW || physH > availH) {
    cellPx = Math.min(availW / fp.wCells, availH / fp.hCells);
  }
  SQUARE_PX = cellPx;
  const w = fp.wCells * cellPx;
  const h = fp.hCells * cellPx;

  // Position: align to the player edge (opposite the DM); center on the cross axis.
  let leftPx, topPx;
  if (DM_EDGE === 'left') {
    leftPx = window.innerWidth - inset.rightPx - w;
    topPx = inset.topPx + (availH - h) / 2;
  } else if (DM_EDGE === 'right') {
    leftPx = inset.leftPx;
    topPx = inset.topPx + (availH - h) / 2;
  } else if (DM_EDGE === 'top') {
    leftPx = inset.leftPx + (availW - w) / 2;
    topPx = window.innerHeight - inset.bottomPx - h;
  } else if (DM_EDGE === 'bottom') {
    leftPx = inset.leftPx + (availW - w) / 2;
    topPx = inset.topPx;
  } else {
    leftPx = inset.leftPx + (availW - w) / 2;
    topPx = inset.topPx + (availH - h) / 2;
  }
  window.__projPos = { leftPx, topPx };

  if (state.map.image_path) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve({ w, h, src: state.map.image_path });
      img.onerror = () => resolve({ w, h, src: null });
      img.src = state.map.image_path;
    });
  }
  return Promise.resolve({ w, h, src: null });
}

function drawZones(canvas, state) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (const z of (state.map.zones || [])) {
    ctx.fillStyle = ZONE_COLORS[z.type] || 'rgba(255,255,255,0.05)';
    if (z.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(z.cx*SQUARE_PX, z.cy*SQUARE_PX, z.r*SQUARE_PX, 0, Math.PI*2);
      ctx.fill();
    } else if (z.shape === 'polygon') {
      const pts = z.points || [];
      if (pts.length >= 3) {
        ctx.beginPath();
        ctx.moveTo(pts[0][0]*SQUARE_PX, pts[0][1]*SQUARE_PX);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0]*SQUARE_PX, pts[i][1]*SQUARE_PX);
        ctx.closePath();
        ctx.fill();
      }
    } else {
      ctx.fillRect(z.x*SQUARE_PX, z.y*SQUARE_PX, z.w*SQUARE_PX, z.h*SQUARE_PX);
    }
  }
}

function drawGrid(canvas, state) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = 'rgba(40, 40, 50, 0.55)';
  ctx.lineWidth = 1;
  const gridType = state?.map?.grid_type || 'square';
  if (gridType === 'hex') {
    drawHexGrid(ctx, cols, rows, SQUARE_PX);
  } else {
    for (let x = 0; x <= cols; x++) { ctx.beginPath(); ctx.moveTo(x*SQUARE_PX, 0); ctx.lineTo(x*SQUARE_PX, rows*SQUARE_PX); ctx.stroke(); }
    for (let y = 0; y <= rows; y++) { ctx.beginPath(); ctx.moveTo(0, y*SQUARE_PX); ctx.lineTo(cols*SQUARE_PX, y*SQUARE_PX); ctx.stroke(); }
  }
}

function drawHexGrid(ctx, cols, rows, sq) {
  // Pointy-top hex with offset rows. size = sq/2, hex_height = 2*size = sq, hex_width = sqrt(3)*size.
  const size = sq / 2;
  const hexW = Math.sqrt(3) * size;
  const hexH = 2 * size;
  const vSpacing = hexH * 0.75;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cx = c * hexW + hexW/2 + (r % 2) * hexW/2;
      const cy = r * vSpacing + size;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI/2 + i * Math.PI/3;
        const px = cx + size * Math.cos(a);
        const py = cy + size * Math.sin(a);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
}

function drawFogAndVision(canvas, state) {
  const ctx = canvas.getContext('2d');
  canvas.width = cols*SQUARE_PX; canvas.height = rows*SQUARE_PX;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const explored = new Set((state.fog_revealed || []).map(([x,y]) => `${x},${y}`));
  const visible = new Set((state.currently_visible || []).map(([x,y]) => `${x},${y}`));
  const hex = isHex();
  const hexSize = SQUARE_PX / 2;
  for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) {
    const key = `${x},${y}`;
    if (visible.has(key)) continue;
    ctx.fillStyle = explored.has(key) ? 'rgba(120, 125, 140, 0.55)' : 'rgba(60, 65, 80, 0.85)';
    if (hex) {
      const [cx, cy] = cellCenter(x, y);
      hexPath(ctx, cx*SQUARE_PX, cy*SQUARE_PX, hexSize);
      ctx.fill();
    } else {
      ctx.fillRect(x*SQUARE_PX, y*SQUARE_PX, SQUARE_PX, SQUARE_PX);
    }
  }
}

function drawWalls(canvas, state) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = Math.max(3, SQUARE_PX*0.15);
  ctx.lineCap = 'round';
  for (const w of (state.map.walls || [])) {
    ctx.beginPath();
    ctx.moveTo(w.x1*SQUARE_PX, w.y1*SQUARE_PX);
    ctx.lineTo(w.x2*SQUARE_PX, w.y2*SQUARE_PX);
    ctx.stroke();
  }
}

function drawVisionCircles(canvas, state) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (const v of (state.vision_circles || [])) {
    if (v.x === null || v.x === undefined) continue;
    const [cgx, cgy] = cellCenter(v.x, v.y);
    const cx = cgx * SQUARE_PX;
    const cy = cgy * SQUARE_PX;
    const ranges = [
      { ft: v.light_emission_ft, fill: 'rgba(255, 200, 80, 0.18)', stroke: 'rgba(220,150,30,0.7)' },
      { ft: v.darkvision_ft, fill: 'rgba(60, 120, 220, 0.10)', stroke: 'rgba(40,90,180,0.55)' },
    ];
    for (const r of ranges) {
      if (!r.ft) continue;
      const radPx = (r.ft / FEET_PER_SQUARE) * SQUARE_PX;
      ctx.fillStyle = r.fill;
      ctx.beginPath(); ctx.arc(cx, cy, radPx, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = r.stroke;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(cx, cy, radPx, 0, Math.PI*2); ctx.stroke();
    }
  }
}

function drawPendingWalk(canvas, state) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const pw = state.pending_walk;
  if (!pw || !pw.path || !pw.path.length || !pw.from) return;
  ctx.strokeStyle = 'rgba(212, 160, 23, 0.95)';
  ctx.lineWidth = Math.max(4, SQUARE_PX * 0.16);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const [sx, sy] = cellCenter(pw.from[0], pw.from[1]);
  ctx.beginPath();
  ctx.moveTo(sx * SQUARE_PX, sy * SQUARE_PX);
  for (const p of pw.path) {
    const [px, py] = cellCenter(p[0], p[1]);
    ctx.lineTo(px * SQUARE_PX, py * SQUARE_PX);
  }
  ctx.stroke();
  // Step pips
  ctx.fillStyle = 'rgba(212, 160, 23, 0.9)';
  for (const p of pw.path) {
    const [px, py] = cellCenter(p[0], p[1]);
    ctx.beginPath();
    ctx.arc(px * SQUARE_PX, py * SQUARE_PX, Math.max(3, SQUARE_PX * 0.10), 0, Math.PI * 2);
    ctx.fill();
  }
  // Cost label at the destination
  const last = pw.path[pw.path.length - 1];
  const [lx, ly] = cellCenter(last[0], last[1]);
  ctx.fillStyle = '#1a1a1a';
  ctx.strokeStyle = 'rgba(255, 230, 150, 0.95)'; ctx.lineWidth = 4;
  ctx.font = `bold ${Math.max(14, Math.round(SQUARE_PX * 0.55))}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const text = `${pw.cost_ft || 0} ft`;
  const tx = lx * SQUARE_PX, ty = ly * SQUARE_PX - SQUARE_PX * 0.7;
  ctx.strokeText(text, tx, ty);
  ctx.fillText(text, tx, ty);
}

function renderTokens(layer, state) {
  layer.innerHTML = '';
  for (const lc of state.live_characters) {
    if (lc.x === null || lc.x === undefined) continue;
    const t = document.createElement('div');
    t.className = 'token ' + (lc.is_enemy ? 'enemy' : 'pc') + (lc.is_current ? ' current' : '');
    const size = Math.max(20, SQUARE_PX * 0.85);
    const [cx, cy] = cellCenter(lc.x, lc.y);
    t.style.width = size + 'px';
    t.style.height = size + 'px';
    t.style.left = (cx * SQUARE_PX - size / 2) + 'px';
    t.style.top = (cy * SQUARE_PX - size / 2) + 'px';
    t.title = lc.name;
    t.textContent = lc.name.slice(0, 2).toUpperCase();
    if (lc.current_hp !== undefined && lc.current_hp <= 0) t.classList.add('dead');
    layer.appendChild(t);
  }
}

function makeCanvas(parent, id, w, h) {
  const c = document.createElement('canvas');
  c.id = id; c.width = w; c.height = h;
  c.style.position = 'absolute'; c.style.top = '0'; c.style.left = '0';
  parent.appendChild(c);
  return c;
}

async function render() {
  const state = await fetchState();
  if (!state) return;
  if (!state.map) {
    document.getElementById('waiting').style.display = '';
    document.getElementById('map-wrap').style.display = 'none';
    document.getElementById('status-bar').style.display = 'none';
    return;
  }
  document.getElementById('waiting').style.display = 'none';
  const wrap = document.getElementById('map-wrap');
  wrap.style.display = '';
  wrap.innerHTML = '';

  const dims = await fitToWindow(state);
  const pos = window.__projPos || { leftPx: 0, topPx: 0 };
  wrap.style.position = 'absolute';
  wrap.style.left = pos.leftPx + 'px';
  wrap.style.top = pos.topPx + 'px';
  wrap.style.width = dims.w + 'px';
  wrap.style.height = dims.h + 'px';

  if (dims.src) {
    const im = document.createElement('img');
    im.src = dims.src; im.style.width = dims.w + 'px'; im.style.height = dims.h + 'px';
    im.style.position = 'absolute'; im.style.top = '0'; im.style.left = '0';
    im.draggable = false;
    wrap.appendChild(im);
  } else {
    wrap.style.background = '#ffffff';
  }

  const zoneCanvas = makeCanvas(wrap, 'zone-canvas', dims.w, dims.h);
  const visionCanvas = makeCanvas(wrap, 'vision-canvas', dims.w, dims.h);
  const wallCanvas = makeCanvas(wrap, 'wall-canvas', dims.w, dims.h);
  const fogCanvas = makeCanvas(wrap, 'fog-canvas', dims.w, dims.h);
  const gridCanvas = makeCanvas(wrap, 'grid-canvas', dims.w, dims.h);

  const tokenLayer = document.createElement('div');
  tokenLayer.id = 'token-layer';
  tokenLayer.className = 'layer';
  tokenLayer.style.width = dims.w + 'px'; tokenLayer.style.height = dims.h + 'px';
  wrap.appendChild(tokenLayer);

  const pathCanvas = makeCanvas(wrap, 'path-canvas', dims.w, dims.h);

  drawZones(zoneCanvas, state);
  drawVisionCircles(visionCanvas, state);
  drawWalls(wallCanvas, state);
  drawFogAndVision(fogCanvas, state);
  drawGrid(gridCanvas, state);
  drawPendingWalk(pathCanvas, state);
  renderTokens(tokenLayer, state);

  document.getElementById('status-bar').style.display = state.in_combat ? '' : 'none';
  if (state.in_combat) {
    document.querySelector('#status-bar .round').textContent = `round ${state.round_number}`;
    const cur = state.live_characters.find(c => c.is_current);
    document.querySelector('#status-bar .turn').textContent = cur ? cur.name : '—';
  }
}

function connectSSE() {
  const es = new EventSource(`/sessions/${SESSION_ID}/events`);
  es.addEventListener('state_changed', () => render());
  es.onerror = () => { setTimeout(connectSSE, 2000); es.close(); };
}

window.addEventListener('resize', () => render());
render();
connectSSE();
</script>
</body>
</html>
